name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  check-version:
    name: Forget to update the version?
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/pyproject.toml') }}-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          sudo apt-get -y install jq
      - name: Update SSL certificates
        run: |
          python3 scripts/gen_ssl.py
      - name: Build package
        run: |
          python -m build
      - name: Download PyPI info for version check
        run: wget -q -O pypi_version.json https://pypi.org/pypi/PyPtt/json
      - name: Check for version duplication
        run: |
          CURRENT_VERSION=$(cat version.txt)
          PYPI_VERSION=$(jq -r '.info.version' pypi_version.json)
          echo "Local version: $CURRENT_VERSION"
          echo "PyPI version: $PYPI_VERSION"
          if [[ "$CURRENT_VERSION" == "$PYPI_VERSION"* ]]; then
            echo "Error: Version $CURRENT_VERSION has a prefix that already exists on PyPI ($PYPI_VERSION). Please update the version in PyPtt/__init__.py"
            exit 1
          else
            echo "Version check passed. $CURRENT_VERSION is a new version."
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            dist/
            version.txt

  deploy-pypi:
    needs: [check-version]
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  deploy-ghcr:
    needs: [check-version]
    name: Deploy to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .
      - name: Get package version
        id: get_version
        run: echo "PYPTT_VERSION=$(cat version.txt)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set image name to lowercase
        id: image_name
        run: echo "NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.image_name.outputs.NAME }}:latest
            ghcr.io/${{ steps.image_name.outputs.NAME }}:${{ env.PYPTT_VERSION }}
          build-args: |
            PYPTT_VERSION=${{ env.PYPTT_VERSION }}
            PYPI_REGISTRY_URL=https://pypi.org/simple
          cache-from: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache,mode=max
