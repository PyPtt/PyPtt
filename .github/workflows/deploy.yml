# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: deploy

on:
  push:
    paths:
      - 'PyPtt/**/*'
      - 'setup.py'
      - 'requirements.txt'
      - 'docker/*'
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to PyPI and Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          # Download PyPI information for version generation
          wget -q -O pypi_version.json https://pypi.org/pypi/PyPtt/json
      - name: Update SSL certificates
        run: |
          python3 scripts/gen_ssl.py
      - name: Build package
        run: |
          python -m build
      - name: Publish package to TestPyPI
        if: github.ref != 'refs/heads/master'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
      - name: Publish package to PyPI
        if: github.ref == 'refs/heads/master'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Get package version
        id: get_version
        run: echo "PYPTT_VERSION=$(grep '__version__' PyPtt/__init__.py | cut -d"'" -f2)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image for master
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: codingman000/pyptt:latest, codingman000/pyptt:${{ env.PYPTT_VERSION }}
      - name: Build and push Docker image for test branches
        if: github.ref != 'refs/heads/master'
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: codingman000/pyptt:test-${{ github.ref_name }}
