name: Test and Deploy

on:
  push:
  pull_request:
    types:
      - opened
  workflow_dispatch:

jobs:
  check-version:
    name: Forget to update the version?
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/pyproject.toml') }}-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          sudo apt-get -y install jq
      - name: Build package
        run: |
          python -m build
      - name: Download PyPI info for version check
        run: wget -q -O pypi_version.json https://pypi.org/pypi/PyPtt/json
      - name: Check for version duplication
        run: |
          CURRENT_VERSION=$(cat version.txt)
          PYPI_VERSION=$(jq -r '.info.version' pypi_version.json)
          echo "Local version: $CURRENT_VERSION"
          echo "PyPI version: $PYPI_VERSION"
          if [[ "$CURRENT_VERSION" == "$PYPI_VERSION"* ]]; then
            echo "Error: Version $CURRENT_VERSION has a prefix that already exists on PyPI ($PYPI_VERSION). Please update the version in PyPtt/__init__.py"
            exit 1
          else
            echo "Version check passed. $CURRENT_VERSION is a new version."
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            dist/
            version.txt

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t" ]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}-${{ hashFiles('**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 PyPtt/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 PyPtt/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test PyPtt
        run: |
          python -m pytest tests/test_init.py \
          tests/test_i18n.py \
          tests/test_exceptions.py \
          tests/test_logger.py \
          tests/test_vt100_parser.py \
          tests/test_get_post_list_parser.py \
          tests/test_pyte_parity.py \
          tests/test_del_post_unit.py

  # Runs the credentialed integration suite (tests/) against a disposable
  # local pttbbs container instead of the real PTT (cloud runners can't reach
  # PTT1/PTT2). `continue-on-error: true` and deliberately absent from the
  # `needs:` of deploy-pypi/deploy-ghcr/deploy-docs below: this job is a
  # signal, not a gate, while it's still being hardened.
  test-integration:
    name: Integration tests (local pttbbs)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Fixed test accounts provisioned by scripts/bootstrap_local_pttbbs.py
      # into the disposable container below -- not secrets, nothing to leak.
      MOD_BOARD: PyPttMod
      PTT_HOST: LOCALHOST
      PTT1_ID: pypttbot1
      PTT1_PW: test1234
      PTT2_ID: pypttbot2
      PTT2_PW: test5678
      TEST_USER: pypttbot2
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          # Locked to 3.12 (not the test job's matrix): bootstrap shells out
          # to scripts/gen_local_passwds.py, which needs the stdlib `crypt`
          # module removed in 3.13.
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Start local pttbbs container
        run: docker run -d --name ptt -p 8888:8888 -p 48763:48763 bbsdocker/imageptt
      - name: Wait for local pttbbs to accept connections
        run: |
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/48763) 2>/dev/null; then
              exec 3<&- 3>&-
              echo "pttbbs WebSocket port ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "pttbbs did not open port 48763 in time" >&2
          docker logs ptt
          exit 1
      - name: Bootstrap accounts, boards and seed content
        run: python scripts/bootstrap_local_pttbbs.py ptt
      - name: Run integration suite
        run: |
          # Each test file gets its own pytest process (one shared session
          # across all of tests/ is flaky here: mutation-heavy tests
          # intermittently hit ConnectionClosed / NoSuchBoard / session-state
          # errors -- see CLAUDE.md). Two files carry ordering constraints
          # baked into the *fresh, disposable* container's shared state:
          #
          #   - test_comment.py must run FIRST: every file's session
          #     teardown deletes each bot's own recent posts on board
          #     'Test' (tests/util.py::del_all_post), so by the second file
          #     the seed post test_comment.py reads (and doesn't create
          #     itself) is already gone.
          #   - test_bucket.py must run LAST: its success path mutes
          #     TEST_USER (pypttbot2) on MOD_BOARD for a full day, which
          #     breaks every later test that needs TEST_USER able to post.
          #     test_del_post.py runs right before it for the same reason
          #     (its own last test, test_bad_post, additionally mutes
          #     TEST_USER globally for ~1 hour -- fine since nothing but
          #     test_bucket.py, which tolerates an already-banned user,
          #     follows it).
          #
          # test_get_time.py is excluded: confirmed (by re-running standalone
          # against a fresh container) to fail independently of
          # ordering/pollution -- a LOCALHOST time-format mismatch, not CI
          # flakiness. See CLAUDE.md.
          set +e
          EXCLUDE="test_get_time.py|test_comment.py|test_del_post.py|test_bucket.py"
          MIDDLE=$(find tests -maxdepth 1 -name 'test_*.py' -printf '%f\n' | grep -vE "^(${EXCLUDE})$" | sort)
          ORDER="test_comment.py ${MIDDLE} test_del_post.py test_bucket.py"

          FAILED=0
          for f in $ORDER; do
            echo "::group::tests/$f"
            python -m pytest "tests/$f" -q
            rc=$?
            [ $rc -ne 0 ] && FAILED=1
            echo "::endgroup::"
          done
          exit $FAILED
      - name: Container logs (always, for debugging)
        if: always()
        run: docker logs ptt

  test-build-docs:
    name: Test building documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Build the docs
        run: |
          cd docs && make html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          publish_branch: gh-pages-test


  deploy-pypi:
    needs: [test, check-version, test-build-docs]
    name: Deploy to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
      - name: Publish package to PyPI
        if: github.ref == 'refs/heads/master'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  deploy-ghcr:
    needs: [test, check-version, test-build-docs]
    name: Deploy to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .
      - name: Get package version
        id: get_version
        run: echo "PYPTT_VERSION=$(cat version.txt)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set image name to lowercase
        id: image_name
        run: echo "NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image for master
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.image_name.outputs.NAME }}:latest
            ghcr.io/${{ steps.image_name.outputs.NAME }}:${{ env.PYPTT_VERSION }}
          build-args: |
            PYPTT_VERSION=${{ env.PYPTT_VERSION }}
            PYPI_REGISTRY_URL=https://pypi.org/simple
          cache-from: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache,mode=max
      - name: Build and push Docker image for test branches
        if: github.ref != 'refs/heads/master'
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.image_name.outputs.NAME }}:${{ env.PYPTT_VERSION }}
          build-args: |
            PYPTT_VERSION=${{ env.PYPTT_VERSION }}
            PYPI_REGISTRY_URL=https://test.pypi.org/simple
          cache-from: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.image_name.outputs.NAME }}:buildcache,mode=max

  deploy-docs:
    needs: [test, check-version, test-build-docs]
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
    - name: Build the docs
      run: |
        cd docs && make html
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html